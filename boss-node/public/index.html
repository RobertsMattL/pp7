<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://localhost:8080; img-src 'self' data:">
  <title>ParallelAgents Boss</title>
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="vendor/github-dark.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="header-title">
        <h1>ParallelAgents Boss</h1>
        <span class="project-name" id="project-name"></span>
        <div class="connection-status" id="connection-status">
          <span class="status-dot"></span>
          <span class="status-text">Disconnected</span>
        </div>
      </div>
      <div class="header-info">
        <span id="agent-count">0 Agents</span>
        <button class="add-agent-btn" id="add-agent-btn" title="Create Agent">+ Agent</button>
      </div>
    </header>

    <!-- Global Git Status Panel -->
    <div id="git-status-panel" class="git-status-panel"></div>

    <!-- Tab Bar -->
    <div class="tab-bar" id="tab-bar">
      <button class="tab active" data-tab="agents">All Agents</button>
    </div>

    <!-- Main Content Area -->
    <main class="main-content" id="main-content">
      <div class="no-agents" id="no-agents">
        <div class="no-agents-message">
          <h2>No Agents Connected</h2>
          <p>Click <strong>+ Agent</strong> to add an agent, or use <strong>File &rarr; New Project</strong> to create a new project with a repository URL.</p>
        </div>
      </div>
      <!-- Agent consoles will be dynamically added here -->
    </main>

    <!-- Terminal views (one per agent, shown when tab selected) -->
    <div class="terminal-container" id="terminal-container" style="display: none;"></div>
  </div>

  <!-- New Project Dialog -->
  <div id="new-project-dialog" class="dialog-overlay" style="display: none;">
    <div class="dialog">
      <div class="dialog-header">
        <h2>New Project</h2>
        <button class="close-btn" id="close-new-project-dialog">&times;</button>
      </div>
      <div class="dialog-content">
        <div class="form-group">
          <label for="project-name-input">Project Name</label>
          <input
            type="text"
            id="project-name-input"
            placeholder="My Project"
            autocomplete="off"
          >
        </div>
        <div class="form-group">
          <label for="project-github-url">Git Repository URL</label>
          <input
            type="text"
            id="project-github-url"
            placeholder="https://github.com/user/repo.git or git@github.com:user/repo.git"
            autocomplete="off"
          >
        </div>
      </div>
      <div class="dialog-footer">
        <button class="btn btn-secondary" id="cancel-new-project-dialog">Cancel</button>
        <button class="btn btn-primary" id="confirm-new-project">Create Project</button>
      </div>
    </div>
  </div>

  <!-- Add Agent Dialog -->
  <div id="agent-config-dialog" class="dialog-overlay" style="display: none;">
    <div class="dialog">
      <div class="dialog-header">
        <h2>Add Agent</h2>
        <button class="close-btn" id="close-dialog">&times;</button>
      </div>
      <div class="dialog-content">
        <div class="form-group">
          <label for="agent-name">Agent Name</label>
          <input
            type="text"
            id="agent-name"
            placeholder="Enter a name for this agent"
            autocomplete="off"
          >
        </div>
      </div>
      <div class="dialog-footer">
        <button class="btn btn-secondary" id="cancel-dialog">Cancel</button>
        <button class="btn btn-primary" id="create-agent">Create Agent</button>
      </div>
    </div>
  </div>

  <!-- Settings Dialog -->
  <div id="settings-dialog" class="dialog-overlay" style="display: none;">
    <div class="dialog">
      <div class="dialog-header">
        <h2>Settings</h2>
        <button class="close-btn" id="close-settings-dialog">&times;</button>
      </div>
      <div class="dialog-content">
        <div class="form-group">
          <label for="repo-root-path">Repo Root</label>
          <div class="input-with-button">
            <input
              type="text"
              id="repo-root-path"
              placeholder="Directory where agent repos are cloned"
              autocomplete="off"
              readonly
            >
            <button class="btn btn-secondary" id="browse-repo-root">Browse</button>
          </div>
        </div>
      </div>
      <div class="dialog-footer">
        <button class="btn btn-secondary" id="cancel-settings-dialog">Cancel</button>
        <button class="btn btn-primary" id="save-settings">Save</button>
      </div>
    </div>
  </div>

  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="vendor/highlight.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
