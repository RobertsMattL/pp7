<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://localhost:8080">
  <title>ParallelAgents Boss</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="header-title">
        <h1>ParallelAgents Boss</h1>
        <div class="connection-status" id="connection-status">
          <span class="status-dot"></span>
          <span class="status-text">Disconnected</span>
        </div>
      </div>
      <div class="header-info">
        <span id="agent-count">0 Agents</span>
        <button class="add-agent-btn" id="add-agent-btn" title="Create Agent">+ Agent</button>
      </div>
    </header>

    <!-- Global Git Status Panel -->
    <div id="git-status-panel" class="git-status-panel"></div>

    <!-- Main Content Area -->
    <main class="main-content" id="main-content">
      <div class="no-agents" id="no-agents">
        <div class="no-agents-message">
          <h2>No Agents Connected</h2>
          <p>Click <strong>+ Agent</strong> or use <strong>File &rarr; New Agent from GitHub</strong> to clone a repository and start an agent.</p>
        </div>
      </div>
      <!-- Agent consoles will be dynamically added here -->
    </main>
  </div>

  <!-- Agent Configuration Dialog -->
  <div id="agent-config-dialog" class="dialog-overlay" style="display: none;">
    <div class="dialog">
      <div class="dialog-header">
        <h2>New Agent from GitHub</h2>
        <button class="close-btn" id="close-dialog">&times;</button>
      </div>
      <div class="dialog-content">
        <div class="form-group">
          <label for="github-url">GitHub Repository URL</label>
          <input
            type="text"
            id="github-url"
            placeholder="https://github.com/username/repo.git"
            autocomplete="off"
          >
        </div>
        <div class="form-group">
          <label for="agent-name">Agent Name (optional)</label>
          <input
            type="text"
            id="agent-name"
            placeholder="Leave empty to use repository name"
            autocomplete="off"
          >
        </div>
      </div>
      <div class="dialog-footer">
        <button class="btn btn-secondary" id="cancel-dialog">Cancel</button>
        <button class="btn btn-primary" id="create-agent">Clone & Create Agent</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
